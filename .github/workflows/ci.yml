name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Format Check
        run: |
          if [ "$(gofmt -l .)" != "" ]; then
            echo "Go files are not formatted"
            gofmt -l .
            exit 1
          fi